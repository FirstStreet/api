type Adaptation {
	"""
	The type of adaptation.
	"""
	type: AdaptationType!

	"""
	The display name of the adaptation.
	"""
	name: String!

	"""
	The perils associated with the adaptation.
	"""
	peril: [AdaptationPeril!]!

	"""
	The annual cost of the adaptation.
	"""
	annualCost: Int64

	"""
	The setup cost of the adaptation.
	"""
	setupCost: Int64

	"""
	The AAL (Average Annual Loss) associated with the adaptation.
	"""
	aal: [AdaptationAAL!]

	"""
	Payback period information for the adaptation.
	"""
	paybackYears: [PaybackYears!]
}

type AdaptationAAL {
	"""
	Percentile value for estimates, one of: 10, 50, 90. 10th percentile estimate is low value, 90th percentile is high value, and 50th is mean.
	"""
	percentile: Int

	"""
	Year, as relative to the current year.
	"""
	relativeYear: Int

	"""
	The savings on investment due to the adaptation.
	"""
	adaptationSOI: Int64

	"""
	The savings on investment as a percentage of the adaptation cost.
	"""
	adaptationSOIPct: Float

	"""
	The cumulative difference in average annual cash loss due to the adaptation.
	"""
	cashLossCumulativeDiff: Int64

	"""
	The cumulative difference in average annual cash loss as a percentage of the total rebuild cost.
	"""
	cashLossCumulativeDiffPct: Float
}

enum AdaptationPeril {
	FLOOD
	WILDFIRE
	WIND
}

enum AdaptationType {
	FLOOD_BARRIER_TO_1_FOOT
	FLOOD_BARRIER_TO_2_FEET
	FLOOD_BARRIER_TO_3_FEET
	FLOOD_BARRIER_TO_4_FEET
	FLOOD_BARRIER_TO_5_FEET
	FLOOD_BARRIER_TO_6_FEET
	FLOOD_BARRIER_TO_7_FEET
	FLOOD_BARRIER_TO_8_FEET
