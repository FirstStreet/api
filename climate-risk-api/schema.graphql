administrative divisions but do not necessarily correspond to specific political or
governmental divisions. The same AdministrativeLevel may represent different types of
divisions in different parts of the world.

Example:
* In the United States: ADMIN_0 = Country, ADMIN_1 = State, ADMIN_2 = County, METRO = Metropolitan Area
* In Norway: ADMIN_0 = Country, ADMIN_1 = County (no intermediate level)
"""
