type Query {
	"""
	Locality lookup by locality ID.
	"""
	locality(
		"""
		First Street Locality ID.
		"""
		localityId: Int64!

		"""
		Input options.
		"""
		options: InputOptions
	): Locality
	localitiesByMacroeconomicConnection(
		"""
		Number of records(edges) to return. A number between 0 and 50.
		"""
		first: Int

		"""
		Cursor value of a record(edge) past which records should be returned. Cursor can be obtained from an earlier call. Cursor is a string between 10 and 32 characters long.
		"""
		after: String

		"""
		Sort the localities
		"""
		sort: LocalityMacroeconomicSort

		"""
		Filter the localities
		"""
		filter: LocalityMacroeconomicFilter!

		"""
		Input options.
		"""
		options: InputOptions
	): LocalitiesConnection

	"""
	Place lookup by placeId.
	"""
	place(
		"""
		First Street Place ID.
		"""
		placeId: String!

		"""
		Building details for damages estimation.
		"""
		building: BuildingInput

		"""
		Input options.
		"""
		options: InputOptions
	): Place

	"""
	Place lookup by address.
	"""
	placeByAddress(
		"""
		The address of the place.
		"""
		address: String!

		"""
		The latitude of the place. If provided, lookup will attempt to match the address to the closest point.
		"""
		lat: Float

		"""
		The longitude of the place. If provided, lookup will attempt to match the address to the closest point.
		"""
		lng: Float

		"""
		Building details for damages estimation.
		"""
		building: BuildingInput

		"""
		Input options.
		"""
		options: InputOptions
	): Place

	"""
	Place lookup by coordinate.
	"""
	placeByCoordinate(
		"""
		The latitude of the place.
		"""
		lat: Float!

		"""
		The longitude of the place.
		"""
		lng: Float!

		"""
		Building details for damages estimation.
		"""
		building: BuildingInput

		"""
		Input options.
		"""
		options: InputOptions
	): Place

	"""
	Asset type IDs along with human-readable descriptions.
	"""
	assetTypes: [AssetType!]!

	"""
	Metadata lookup.
	"""
	metadataLookup: MetadataLookup!

	"""
	Current API version
	"""
	version: ReleaseVersion!

	"""
	Geospatial operations.
	"""
	geospatial: Geospatial!

	"""
	Adaptation costs and savings for place.
	"""
	adaptations(
		"""
		First Street Place ID.
		"""
		placeId: String!

		"""
		Building details for damages estimation.
		"""
		building: BuildingInput

		"""
		Adaptations input.
		"""
		input: AdaptationsInput!

		"""
		Input options.
		"""
		options: InputOptions
	): AdaptationsResponse
